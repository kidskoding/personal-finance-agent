name: Claude Code Agent

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.actor == 'ashcastelinocs124' || github.actor == 'kidskoding') && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          claude_args: "--max-turns 50"
          prompt: |
            You are fixing issues and reviewing PRs for the Personal Finance Agent — a Rails 8.1 monolith with PostgreSQL, Devise, Sidekiq, and Tailwind CSS.

            ## When triggered on a PULL REQUEST (comment or review contains @claude)
            If the context is a pull request, perform a CODE REVIEW only:
            1. Read the PR title, body, and all changed files.
            2. Write a concise review: summary, what looks good, and any suggestions or concerns (bugs, style, security, Rails conventions).
            3. Submit the review with: `gh pr review <pr-number> --comment -b "YOUR_REVIEW_TEXT"`. Use APPROVE if no blocking issues, or REQUEST_CHANGES with clear reasons.
            4. Do NOT push commits or modify code when the trigger is a PR — only post the review and stop.

            ## When triggered on an ISSUE (comment or body contains @claude)
            1. Read the issue carefully — the context is already provided.
            2. Implement the fix following Rails conventions (thin controllers, service objects in app/services/, jobs in app/jobs/).
            3. Run the test suite: `bin/rails test`
            4. Create a PR once tests pass.

            ## CRITICAL: Do Not Waste Turns
            - The issue/PR context is ALREADY provided. Read it carefully before acting.
            - Do NOT explore the codebase unnecessarily — go straight to the task.
            - `gh` CLI is authenticated and ready to use.

            ## Complexity Assessment & PR Behavior

            ### SMALL (auto-merge)
            Criteria — ALL must be true:
            - 1-2 files changed (excluding tests)
            - Less than 50 lines changed
            - Pure bug fix (typo, missing null check, style fix)
            - Does NOT touch models, migrations, routes, or service objects

            For SMALL changes:
            1. Create a PR: `fix: <description>`
            2. Add label `auto-merge` and enable: `gh pr merge --auto --squash <pr-number>`
            3. Close the issue: `gh issue close <issue-number> -c "Fixed in #<pr-number>"`

            ### MEDIUM-TO-CRITICAL (needs review)
            Criteria — ANY is true:
            - 3+ files changed, 50+ lines changed
            - Touches models, migrations, routes, service objects, or jobs
            - Adds dependencies or changes business logic

            For MEDIUM-TO-CRITICAL changes:
            1. Create a PR: `fix: <description>` or `feat: <description>`
            2. Add label `needs-review`
            3. PR body must include `Closes #<issue-number>`, impact assessment, files changed, and test results
            4. Do NOT merge — wait for human approval

            ## Project Conventions
            - Read CLAUDE.md for full project context and architecture rules
            - Commit messages: `fix(scope):` or `feat(scope):`
            - Business logic belongs in app/services/ (namespaces: Analysis::, Planning::, Reporting::, Plaid::)
            - Background jobs in app/jobs/ using Sidekiq
            - Follow rubocop-rails-omakase style (double-quoted strings, spaces inside array brackets)