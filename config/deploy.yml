# Name of your application. Used to uniquely configure containers.
service: personal_finance_agent

# Name of the container image (without registry host; `registry.server` is prepended by Kamal).
image: personal-finance-agent/personal_finance_agent

# Deploy to these servers.
servers:
  web:
    - 159.203.118.84

# DigitalOcean Container Registry.
registry:
  server: registry.digitalocean.com
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# Environment variables injected into containers.
env:
  secret:
    - RAILS_MASTER_KEY
    - PERSONAL_FINANCE_AGENT_DATABASE_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: personal_finance_agent-db
    RAILS_LOG_LEVEL: info

# Build locally in CI using docker driver so registry credentials are inherited.
builder:
  arch: amd64
  driver: docker

# Persistent storage for Active Storage uploads.
volumes:
  - "personal_finance_agent_storage:/rails/storage"

# Bridge assets between deploys to avoid 404s on in-flight requests.
asset_path: /rails/public/assets

# Kamal CLI aliases.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Accessory services managed by Kamal on the Droplet.
accessories:
  db:
    image: postgres:16-alpine
    host: 159.203.118.84
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: personal_finance_agent
        POSTGRES_DB: personal_finance_agent_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    host: 159.203.118.84
    port: "127.0.0.1:6379:6379"
    directories:
      - data:/data
